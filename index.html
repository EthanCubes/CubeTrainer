<!DOCTYPE html>
<html>
    <head>
        <title>CubeTrainer | Rubik's Cube Timer and Algorithm Trainer</title>
        <link rel="stylesheet" href="./src/styles.css">
    </head>
    <body>
        <select id="modeSelect">
            <option value="timer">Timer</option>
            <option value="driller">Driller</option>
        </select>
        <select id="setSelect">
            <option value="OLL">CFOP OLL</option>
            <option value="PLL">CFOP PLL</option>
            <option value="imported">Import Your Own (does not work)</option>
        </select>

        <div id="scrambleContainer">
            <p id="scramble" style="margin: 0px; margin-right: 10px;" onclick="copyScramble()"></p>
            <p onclick="generateScramble()" class="fakeButton" style="background-color: white; border: solid; border-width: 1px; border-radius: 8px; color: black; margin: 0px; padding-left: 5px; padding-right: 5px;">Next Scramble</p>
        </div>

        <div id="timer"><h1>0.000</h1></div>

        <h1 id="timeDifference"></h1>

        <div id="solves">
            <div style="display: flex; ">
                <h2 style="color: black; margin: 0px;">Solves</h2>
                &nbsp;
                <p onclick="clearStoredSolves();" style="color: black; margin: 5px;" class="fakeButton"><u>Clear solves</u></p>
            </div>
            <p id="child"></p>
        </div>

        <div id="drawing">
            <div class="placeholder"></div>
            <div class="drawingFace" id="white">
                <div class="grid" id="grid0"></div>
                <div class="grid" id="grid1"></div>
                <div class="grid" id="grid2"></div>
                <div class="grid" id="grid3"></div>
                <div class="grid" id="grid4"></div>
                <div class="grid" id="grid5"></div>
                <div class="grid" id="grid6"></div>
                <div class="grid" id="grid7"></div>
                <div class="grid" id="grid8"></div>
            </div>
            <div class="placeholder"></div>
            <div class="placeholder"></div>

            <div class="drawingFace" id="orange">
                <div class="grid" id="grid9"></div>
                <div class="grid" id="grid10"></div>
                <div class="grid" id="grid11"></div>
                <div class="grid" id="grid12"></div>
                <div class="grid" id="grid13"></div>
                <div class="grid" id="grid14"></div>
                <div class="grid" id="grid15"></div>
                <div class="grid" id="grid16"></div>
                <div class="grid" id="grid17"></div>
            </div>
            <div class="drawingFace" id="green">
                <div class="grid" id="grid18"></div>
                <div class="grid" id="grid19"></div>
                <div class="grid" id="grid20"></div>
                <div class="grid" id="grid21"></div>
                <div class="grid" id="grid22"></div>
                <div class="grid" id="grid23"></div>
                <div class="grid" id="grid24"></div>
                <div class="grid" id="grid25"></div>
                <div class="grid" id="grid26"></div>
            </div>
            <div class="drawingFace" id="red">
                <div class="grid" id="grid27"></div>
                <div class="grid" id="grid28"></div>
                <div class="grid" id="grid29"></div>
                <div class="grid" id="grid30"></div>
                <div class="grid" id="grid31"></div>
                <div class="grid" id="grid32"></div>
                <div class="grid" id="grid33"></div>
                <div class="grid" id="grid34"></div>
                <div class="grid" id="grid35"></div>
            </div>
            <div class="drawingFace" id="blue">
                <div class="grid" id="grid36"></div>
                <div class="grid" id="grid37"></div>
                <div class="grid" id="grid38"></div>
                <div class="grid" id="grid39"></div>
                <div class="grid" id="grid40"></div>
                <div class="grid" id="grid41"></div>
                <div class="grid" id="grid42"></div>
                <div class="grid" id="grid43"></div>
                <div class="grid" id="grid44"></div>
            </div>

            <div class="placeholder"></div>
            <div class="drawingFace" id="yellow">
                <div class="grid" id="grid45"></div>
                <div class="grid" id="grid46"></div>
                <div class="grid" id="grid47"></div>
                <div class="grid" id="grid48"></div>
                <div class="grid" id="grid49"></div>
                <div class="grid" id="grid50"></div>
                <div class="grid" id="grid51"></div>
                <div class="grid" id="grid52"></div>
                <div class="grid" id="grid53"></div>
            </div>
            <div class="placeholder"></div>
            <div class="placeholder"></div>
        </div>

        <script src="./src/js/timer.js"></script>
        <script src="./src/js/drawingCalculator.js"></script>
        <script src="./src/js/drawingRender.js"></script>
        <script src="./src/js/scramble.js"></script>
        <script src="./src/js/storage.js"></script>
        <script src="./src/js/script.js"></script>
    </body>
</html>
